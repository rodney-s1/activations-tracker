<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Activation Tracker – Blue Arrow GPS">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Activation Tracker">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Activation Tracker</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Identity Services — required for Sign in with Google -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- PDF.js — used to extract text from Rosco invoice PDFs in the browser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    // Configure pdf.js worker
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    // Global helper: extract all text from a PDF given its bytes (Uint8Array).
    // Returns a Promise<string> — all pages concatenated with newlines.
    //
    // Rosco invoice layout notes:
    //   The header table has two columns at the same Y coordinate:
    //     col-left:  "Blue Arrow Telematics(Was Gps Mobil Sol)"
    //     col-right: "GUILFORD EMS"  (the ship-to name we need)
    //   pdf.js returns items left-to-right sorted by X within each Y band.
    //   We annotate each text item with "~~X:NNN~~" so the Dart parser can
    //   reconstruct column positions and reliably extract the ship-to name
    //   even when it lands on a separate Y band from the sold-to cell.
    window.extractPdfText = function(uint8array) {
      return pdfjsLib.getDocument({ data: uint8array }).promise.then(function(pdf) {
        var pagePromises = [];
        for (var i = 1; i <= pdf.numPages; i++) {
          pagePromises.push(
            pdf.getPage(i).then(function(page) {
              return page.getTextContent().then(function(content) {
                // Sort items top-to-bottom (descending Y in PDF space) then
                // left-to-right (ascending X) within each row.  Without this
                // sort, pdf.js returns items in content-stream order which is
                // effectively random — causing items from different rows to be
                // merged and invoice numbers to appear before their labels.
                var sorted = content.items.slice().sort(function(a, b) {
                  var dy = b.transform[5] - a.transform[5]; // desc Y = top first
                  if (Math.abs(dy) > 2) return dy;
                  return a.transform[4] - b.transform[4]; // asc X within row
                });

                // Build lines grouped by Y coordinate (threshold 2 pts).
                // Each item is stored as "text~~X:NNN~~" so the Dart parser
                // can reconstruct column positions and reliably extract the
                // ship-to name even when it is in a right column.
                var lines = [];
                var currentLine = [];
                var lastY = null;
                sorted.forEach(function(item) {
                  var y = item.transform[5]; // vertical position (PDF space)
                  var x = item.transform[4]; // horizontal position
                  if (lastY !== null && Math.abs(y - lastY) > 2) {
                    if (currentLine.length > 0) {
                      lines.push(currentLine.join(''));
                      currentLine = [];
                    }
                  }
                  // Append X annotation after each item so Dart can detect columns
                  currentLine.push(item.str + '~~X:' + Math.round(x) + '~~');
                  lastY = y;
                });
                if (currentLine.length > 0) {
                  lines.push(currentLine.join(''));
                }
                return lines.join('\n');
              });
            })
          );
        }
        return Promise.all(pagePromises).then(function(pages) {
          return pages.join('\n');
        });
      });
    };
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

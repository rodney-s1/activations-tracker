version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  file_picker: 6.1.1
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  provider: 6.1.5+1
